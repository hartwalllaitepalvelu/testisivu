<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hartwall Varaosatilaus</title>
<style>
:root { 
    --hw-blue:#004593; 
    --hw-dark:#002d62;
    --hw-green:#28a745; 
    --sidebar-w: 280px;
}
body { font-family:'Segoe UI',sans-serif; margin:0; background:#f0f2f5; font-size:14px; color:#333; }

/* Kirjautuminen */
#loginOverlay, #adminLoginPopup { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,69,147,0.9); display:flex; justify-content:center; align-items:center; z-index:10000; }
.login-box { background:white; padding:30px; border-radius:15px; width:300px; text-align:center; }

/* Layout */
.app-container { display: flex; min-height: 100vh; }

/* VASEN VALIKKO */
.nav-sidebar { 
    width: var(--sidebar-w); background: white; border-right: 1px solid #ddd; 
    position: sticky; top: 0; height: 100vh; overflow-y: auto; flex-shrink: 0; transition: 0.3s;
}

/* KESKIALUE */
.main-content { flex: 1; padding: 15px; min-width: 0; }

/* OIKEA KORI */
.cart-sidebar { 
    width: var(--sidebar-w); background: white; border-left: 1px solid #ddd; 
    position: sticky; top: 0; height: 100vh; display: flex; flex-direction: column; transition: 0.3s;
}

/* MOBIILINAVIGAATIO */
.mobile-bar { display: none; background: var(--hw-dark); padding: 10px; position: sticky; top: 0; z-index: 1000; gap: 10px; }
.mobile-btn { flex: 1; padding: 10px; background: var(--hw-blue); color: white; border: 1px solid white; border-radius: 5px; font-weight: bold; cursor: pointer; }

/* LOMAKE */
.form-section { background: white; padding: 15px; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 20px; }
.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
.form-group { display: flex; flex-direction: column; }
.form-group label { font-size: 10px; font-weight: bold; color: var(--hw-blue); }
textarea { width: 100%; height: 60px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; padding: 5px; box-sizing: border-box; }

/* TUOTTEET */
.product-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; background: white; }
.qty-area { display: flex; align-items: center; gap: 5px; }
.qty-btn { width: 35px; height: 35px; border: none; background: #eee; border-radius: 4px; font-size: 20px; cursor: pointer; }
.qty-input { width: 40px; text-align: center; border: 1px solid #ccc; padding: 5px; font-weight: bold; }

/* ASENNUSPAKETIT */
.pkg-card { background: #fffde7; border: 2px solid #fbc02d; padding: 10px; margin-bottom: 10px; border-radius: 8px; }

/* YLÖS-NAPPI */
#btnTop { position: fixed; bottom: 20px; right: 20px; background: var(--hw-blue); color: white; border: none; padding: 15px 20px; border-radius: 30px; display: none; z-index: 999; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

/* MODAL */
#imgModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:20000; justify-content:center; align-items:center; }

/* MOBIILI-SÄÄDÖT */
@media (max-width: 1024px) {
    .nav-sidebar, .cart-sidebar { 
        position: fixed; left: -100%; top: 50px; z-index: 2000; width: 85%; height: calc(100vh - 50px);
    }
    .cart-sidebar { left: auto; right: -100%; }
    .nav-sidebar.open { left: 0; }
    .cart-sidebar.open { right: 0; }
    .mobile-bar { display: flex; }
}
</style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2 style="color:var(--hw-blue)">Hartwall Kirjaudu</h2>
        <input id="uField" placeholder="Tunnus" style="width:100%; padding:10px; margin-bottom:10px;">
        <input id="pField" type="password" placeholder="Salasana" style="width:100%; padding:10px; margin-bottom:15px;">
        <button onclick="doAppLogin()" style="width:100%; padding:12px; background:var(--hw-blue); color:white; border:none; cursor:pointer;">KIRJAUDU</button>
    </div>
</div>

<div id="adminLoginPopup" style="display:none;">
    <div class="login-box">
        <h3>Ylläpito</h3>
        <input id="adminUser" placeholder="Käyttäjä" style="width:100%; padding:10px; margin-bottom:10px;">
        <input id="adminPass" type="password" placeholder="Salasana" style="width:100%; padding:10px; margin-bottom:15px;">
        <button onclick="doAdminLogin()" style="width:100%; padding:10px; background:#444; color:white; border:none;">KIRJAUDU</button>
        <button onclick="document.getElementById('adminLoginPopup').style.display='none'" style="background:none; border:none; color:red; margin-top:10px; cursor:pointer;">Peruuta</button>
    </div>
</div>

<div id="appWrapper" style="display:none;">
    <div class="mobile-bar">
        <button class="mobile-btn" onclick="toggleSidebar('nav-sidebar')">☰ TUOTERYHMÄT</button>
        <button class="mobile-btn" onclick="toggleSidebar('cart-sidebar')">🛒 KORI (<span id="m-count">0</span>)</button>
    </div>

    <div class="app-container">
        <nav id="nav-sidebar" class="nav-sidebar">
            <div style="background:var(--hw-dark); color:white; padding:15px; font-weight:bold;">TUOTERYHMÄT</div>
            <div id="dynamic-nav"></div>
        </nav>

        <main class="main-content">
            <div class="form-section">
                <div class="form-grid">
                    <div class="form-group"><label>TILAAJA *</label><input id="f_tilaaja"></div>
                    <div class="form-group"><label>VARASTONRO *</label><input id="f_varasto"></div>
                    <div class="form-group"><label>PÄIVÄMÄÄRÄ</label><input id="f_pvm" type="date"></div>
                    <div class="form-group"><label>TOIMITUSTAPA</label><input id="f_tapa"></div>
                </div>
                <textarea id="f_lisatiedot" placeholder="Lisätiedot..."></textarea>
                <textarea id="f_vapaat" placeholder="Jos tuotetta ei löydy listalta, lisää se tähän muodossa: Nimi, kpl määrä..."></textarea>
            </div>

            <select id="top-cat-select" onchange="jumpTo(this.value)" style="width:100%; padding:12px; margin-bottom:15px; border:2px solid var(--hw-blue); font-weight:bold;"></select>
            <input id="filter" style="width:100%; padding:12px; margin-bottom:15px; box-sizing:border-box;" placeholder="Hae tuotteita..." oninput="render(this.value)">

            <div id="asennuspaketit-area"></div>
            <div id="main-list"></div>
        </main>

        <aside id="cart-sidebar" class="cart-sidebar">
            <div style="background:var(--hw-green); color:white; padding:15px; font-weight:bold; text-align:center;">OSTOSKORI</div>
            <div id="basket-items" style="flex:1; overflow-y:auto; padding:10px;"></div>
            <div style="padding:15px; border-top:1px solid #ddd;">
                <button onclick="finalSubmit()" style="width:100%; padding:15px; background:var(--hw-green); color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">LÄHETÄ TILAUS</button>
                <button onclick="document.getElementById('adminLoginPopup').style.display='flex'" style="width:100%; margin-top:10px; background:none; border:none; color:#999; font-size:10px; cursor:pointer;">Ylläpito</button>
            </div>
        </aside>
    </div>
</div>

<button onclick="window.scrollTo({top:0, behavior:'smooth'})" id="btnTop">YLÖS ↑</button>
<div id="imgModal" onclick="if(event.target===this)this.style.display='none'"><img id="modalImage" style="max-width:90%; max-height:90%;"></div>

<script>
const sallitut = {"tomppa":"Tomi7122","markku":"parkinson","jaakko":"vendingjaska","dan":"huoltodan","tommi":"nappie","samia":"koksmeny","bob":"nayri","jouni":"paju1","jussi":"paukku","sami":"ruoska","jarno":"kurnu"};
const paketit = {
    "ASENNUSPAKETTI OLUT": ["3119", "5670", "5671", "3348", "3349", "1274", "3127", "4225", "4223", "3370", "3121", "5644", "3123"],
    "ASENNUSPAKETTI POST-MIX": ["3119", "5670", "5671", "3348", "3349", "1274", "3127", "4225", "4223", "3370", "3121", "3123"]
};

let data = {}; let cart = {}; let cats = [];

window.onscroll = () => { document.getElementById("btnTop").style.display = window.scrollY > 300 ? "block" : "none"; };

function toggleSidebar(id) {
    const el = document.getElementById(id);
    el.classList.toggle('open');
}

async function doAppLogin() {
    const u = document.getElementById("uField").value.trim().toLowerCase();
    const p = document.getElementById("pField").value.trim();
    if (sallitut[u] === p) {
        document.getElementById("loginOverlay").style.display="none";
        document.getElementById("appWrapper").style.display="block";
        document.getElementById("f_pvm").valueAsDate = new Date();
        await load();
    } else { alert("Virhe!"); }
}

function doAdminLogin() {
    if (document.getElementById("adminUser").value === "admin" && document.getElementById("adminPass").value === "hartwall") {
        alert("Kirjautuminen onnistui! Ylläpitotila aktivoitu (tässä demoversiossa voit nyt nähdä konsoliviestit).");
        document.getElementById("adminLoginPopup").style.display = "none";
    } else { alert("Virhe!"); }
}

async function load() {
    try {
        const [r1, r2] = await Promise.all([fetch("data.txt"), fetch("kategoriat.txt")]);
        data = parseData(await r1.text());
        cats = parseCats(await r2.text());
        renderNav();
        render();
    } catch(e) { console.error(e); }
}

function parseData(t) {
    let d = {}; let cur = null;
    t.split("\n").forEach(l => {
        let s = l.trim(); if(!s) return;
        if(!/\d/.test(s.split(" ")[0])) { cur = s; d[cur] = []; }
        else if(cur) { d[cur].push({code: s.split(" ")[0], name: s.substring(s.split(" ")[0].length).trim()}); }
    });
    return d;
}

function parseCats(t) {
    let res = []; let cur = null;
    t.split("\n").forEach(l => {
        let s = l.trim(); if(!s) return;
        if(l.startsWith("-")) { if(cur) cur.subs.push(s.substring(1)); }
        else { cur = {name: s, subs: []}; res.push(cur); }
    });
    return res;
}

function renderNav() {
    const nav = document.getElementById("dynamic-nav");
    const sel = document.getElementById("top-cat-select");
    nav.innerHTML = ""; sel.innerHTML = '<option value="">-- Valitse kategoria --</option>';
    
    cats.forEach(c => {
        let div = document.createElement("div");
        div.className = "nav-item";
        div.innerHTML = `<div style="padding:12px; font-weight:bold; border-bottom:1px solid #eee; cursor:pointer;" onclick="this.parentElement.classList.toggle('active')">${c.name} ▾</div>`;
        let subDiv = document.createElement("div");
        subDiv.style.display = "none";
        div.appendChild(subDiv);
        div.onclick = (e) => { if(e.target === div.firstChild) subDiv.style.display = subDiv.style.display === "none" ? "block" : "none"; };
        
        c.subs.forEach(s => {
            subDiv.innerHTML += `<div style="padding:8px 25px; font-size:13px; cursor:pointer;" onclick="jumpTo('${s}')">${s}</div>`;
            sel.innerHTML += `<option value="${s}">${s}</option>`;
        });
        nav.appendChild(div);
    });
}

function render(filter = "") {
    const list = document.getElementById("main-list");
    const pkgArea = document.getElementById("asennuspaketit-area");
    list.innerHTML = ""; pkgArea.innerHTML = "";

    // Renderöi asennuspaketit erikseen päälle
    if(!filter && data["ASENNUSPAKETIT"]) {
        data["ASENNUSPAKETIT"].forEach(p => {
            pkgArea.innerHTML += `
                <div class="pkg-card">
                    <div style="font-weight:bold; color:var(--hw-blue)">${p.name}</div>
                    <button onclick="addPkg('${p.name}')" style="margin-top:10px; width:100%; padding:8px; background:var(--hw-blue); color:white; border:none; border-radius:4px; cursor:pointer;">Lisää paketin kaikki osat koriin</button>
                </div>`;
        });
    }

    cats.forEach(c => {
        c.subs.forEach(sub => {
            let prods = data[sub] || [];
            let filt = prods.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()) || p.code.includes(filter));
            if(filt.length === 0) return;

            let block = document.createElement("div");
            block.id = sub;
            block.innerHTML = `<div style="background:var(--hw-blue); color:white; padding:10px; margin:15px 0; border-radius:4px; font-weight:bold;">${sub}</div>`;
            filt.forEach(p => {
                block.innerHTML += `
                    <div class="product-item">
                        <div onclick="openImg('${p.code}')" style="cursor:pointer; flex:1">
                            <div style="font-weight:bold; color:var(--hw-blue)">${p.name}</div>
                            <div style="font-size:11px; color:#666">${p.code}</div>
                        </div>
                        <div class="qty-area">
                            <button class="qty-btn" onclick="updateQty('${p.code}','${p.name}',-1)">-</button>
                            <input class="qty-input" id="q_${p.code}" value="${cart[p.code]?.qty || 0}" readonly>
                            <button class="qty-btn" onclick="updateQty('${p.code}','${p.name}',1)">+</button>
                        </div>
                    </div>`;
            });
            list.appendChild(block);
        });
    });
}

function addPkg(name) {
    let codes = paketit[name];
    if(!codes) return;
    codes.forEach(c => {
        let foundName = "Tuote " + c;
        for(let k in data) { let p = data[k].find(x => x.code === c); if(p) foundName = p.name; }
        updateQty(c, foundName, 1);
    });
    alert("Paketin osat lisätty koriin!");
}

function updateQty(code, name, d) {
    if(!cart[code]) cart[code] = { code, name, qty: 0 };
    cart[code].qty += d;
    if(cart[code].qty <= 0) delete cart[code];
    if(document.getElementById("q_"+code)) document.getElementById("q_"+code).value = cart[code]?.qty || 0;
    
    let div = document.getElementById("basket-items");
    div.innerHTML = "";
    let items = Object.values(cart);
    items.forEach(i => {
        div.innerHTML += `<div style="padding:5px; border-bottom:1px solid #eee; font-size:12px;"><b>${i.qty} kpl</b> - ${i.name}</div>`;
    });
    document.getElementById("basket-count").textContent = items.length;
    document.getElementById("m-count").textContent = items.length;
}

function jumpTo(id) {
    const el = document.getElementById(id);
    if(el) {
        el.scrollIntoView({behavior:"smooth"});
        document.getElementById("nav-sidebar").classList.remove('open');
    }
}

function openImg(c) {
    document.getElementById("modalImage").src = `images/${c}.png`;
    document.getElementById("imgModal").style.display = "flex";
}

function finalSubmit() {
    let f = { t: document.getElementById("f_tilaaja").value, v: document.getElementById("f_varasto").value };
    if(!f.t || !f.v) return alert("Täytä tilaajatiedot!");
    let body = `TILAAJA: ${f.t} (${f.v})\n\nTUOTTEET:\n`;
    Object.values(cart).forEach(i => body += `- ${i.qty} kpl : ${i.name} (${i.code})\n`);
    body += `\nMUUT: ${document.getElementById("f_vapaat").value}`;
    window.location.href = `mailto:lpvarasto@hartwall.fi?subject=Tilaus ${f.t}&body=${encodeURIComponent(body)}`;
}
</script>
</body>
</html>
