<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hartwall Varaosatilaus</title>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<style>
:root { 
    --hw-blue:#004593; 
    --hw-dark:#002d62;
    --hw-light:#eef4fb; 
    --hw-green:#28a745; 
    --sidebar-left: 280px;
    --sidebar-right: 320px; 
}
body { font-family:'Segoe UI',sans-serif; margin:0; background:#f0f2f5; font-size:14px; color:#333; }

/* Kirjautuminen */
#loginOverlay { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--hw-blue); display:flex; justify-content:center; align-items:center; z-index:10000; }
.login-box { background:white; padding:30px; border-radius:15px; width:320px; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,0.3); }
#appWrapper { display:none; }

/* Layout */
.app-container { display: flex; min-height: 100vh; }

/* VASEN VALIKKO */
.nav-sidebar { 
    width: var(--sidebar-left); 
    background: white; 
    border-right: 1px solid #ddd; 
    position: sticky; 
    top: 0; 
    height: 100vh; 
    overflow-y: auto; 
    flex-shrink: 0;
}
.nav-header { background: var(--hw-dark); color: white; padding: 15px; font-weight: bold; }
.nav-item { border-bottom: 1px solid #eee; cursor: pointer; }
.nav-main-cat { padding: 12px 15px; display: flex; justify-content: space-between; font-weight: 600; }
.nav-sub-list { background: #fdfdfd; display: none; padding-bottom: 10px; }
.nav-sub-item { padding: 8px 15px 8px 30px; font-size: 13px; color: #555; }
.nav-sub-item:hover { color: var(--hw-blue); text-decoration: underline; }
.nav-item.active .nav-sub-list { display: block; }

/* KESKIALUE */
.main-content { flex: 1; padding: 20px; min-width: 0; }

/* LOMAKE */
.form-section { background: white; padding: 20px; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 20px; }
.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-bottom: 15px; }
.form-group { display: flex; flex-direction: column; }
.form-group label { font-size: 11px; font-weight: bold; color: var(--hw-blue); margin-bottom: 2px; }
.form-group input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
.full-width-group { grid-column: 1 / -1; margin-top: 10px; }
.full-width-group textarea { width: 100%; height: 80px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; resize: vertical; box-sizing: border-box; font-family: inherit; }

/* TUOTTEET JA MÄÄRÄT */
.product-item { 
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px; border-bottom: 1px solid #eee; background: white; 
}
.product-info { display: flex; align-items: center; gap: 15px; }
.product-thumb { width: 45px; height: 45px; object-fit: contain; cursor: pointer; }
.product-name { font-weight: 600; color: var(--hw-blue); cursor: pointer; }
.qty-area { display: flex; align-items: center; gap: 8px; margin-left: auto; }
.qty-input { width: 45px; text-align: center; border: 1px solid #ccc; padding: 6px; border-radius: 4px; font-weight: bold; }
.qty-btn { width: 35px; height: 35px; border: none; background: #eee; border-radius: 4px; cursor: pointer; font-size: 20px; }

/* OIKEA OSTOSKORI */
.cart-sidebar { width: var(--sidebar-right); background: white; border-left: 1px solid #ddd; position: sticky; top: 0; height: 100vh; display: flex; flex-direction: column; }
.cart-header { background: var(--hw-green); color:white; padding:15px; text-align:center; font-weight:bold; }
.cart-items { flex:1; overflow-y:auto; padding:10px; }

/* PAREMPI SIIRRY YLÖS NAPPI */
#btnTop { 
    position: fixed; bottom: 30px; right: 350px; display: none;
    background: var(--hw-blue); color: white; border: 2px solid white; padding: 12px 20px; 
    border-radius: 30px; cursor: pointer; z-index: 99; font-weight: bold;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: transform 0.2s;
}
#btnTop:hover { transform: scale(1.1); background: var(--hw-dark); }

/* MODAL */
#imgModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:20000; justify-content:center; align-items:center; cursor: zoom-out; }
#modalImage { max-width:90%; max-height:90%; border-radius: 8px; cursor: default; }
</style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2 style="color:var(--hw-blue)">Hartwall Varaosat</h2>
        <input id="uField" placeholder="Käyttäjätunnus" style="width:100%; padding:10px; margin-bottom:10px;">
        <input id="pField" type="password" placeholder="Salasana" style="width:100%; padding:10px; margin-bottom:20px;">
        <button onclick="doAppLogin()" style="width:100%; padding:12px; background:var(--hw-blue); color:white; border:none; cursor:pointer; font-weight:bold;">KIRJAUDU SISÄÄN</button>
    </div>
</div>

<div id="appWrapper">
    <div class="app-container">
        <nav class="nav-sidebar">
            <div class="nav-header">TUOTERYHMÄT</div>
            <div id="dynamic-nav"></div>
        </nav>

        <main class="main-content">
            <div class="form-section">
                <div class="form-grid">
                    <div class="form-group"><label>TILAAJA *</label><input id="f_tilaaja"></div>
                    <div class="form-group"><label>VARASTONRO *</label><input id="f_varasto"></div>
                    <div class="form-group"><label>PÄIVÄMÄÄRÄ *</label><input id="f_pvm" type="date"></div>
                    <div class="form-group"><label>TOIMITUSTAPA *</label><input id="f_tapa"></div>
                    <div class="form-group"><label>OSOITE *</label><input id="f_osoite"></div>
                    <div class="form-group"><label>POSTINRO *</label><input id="f_postinro"></div>
                    <div class="form-group"><label>PAIKKAKUNTA *</label><input id="f_paikka"></div>
                </div>
                <div class="full-width-group">
                    <label>LISÄTIEDOT</label>
                    <textarea id="f_lisatiedot" placeholder="Kirjoita tähän lisätiedot tilauksesta..."></textarea>
                </div>
                <div class="full-width-group">
                    <label>MUUT TUOTTEET (Nimi ja kpl)</label>
                    <textarea id="f_vapaat" placeholder="Jos tuotetta ei löydy listalta, lisää se tähän muodossa: Nimi, kpl määrä..."></textarea>
                </div>
            </div>

            <div style="margin-bottom:15px;">
                <select id="top-cat-select" onchange="jumpTo(this.value)" style="width:100%; padding:12px; border:1px solid var(--hw-blue); border-radius:6px; font-weight:bold;">
                    <option value="">-- Valitse kategoria --</option>
                </select>
            </div>

            <input id="filter" class="search-box" style="width:100%; padding:12px; margin-bottom:15px; box-sizing:border-box;" placeholder="Hae tuotteita..." oninput="render(this.value)">

            <div id="main-list"></div>
        </main>

        <aside class="cart-sidebar">
            <div class="cart-header">OSTOSKORI (<span id="basket-count">0</span>)</div>
            <div id="basket-items" class="cart-items"></div>
            <div style="padding:15px; border-top:1px solid #ddd;">
                <button onclick="finalSubmit()" style="width:100%; padding:15px; background:var(--hw-green); color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer; margin-bottom:10px;">LÄHETÄ TILAUS</button>
                <button onclick="alert('Kirjaudu ylläpitoon (admin/hartwall)')" id="adminBtn" style="width:100%; padding:8px; background:#666; color:white; border:none; border-radius:4px; font-size:11px; cursor:pointer;">YLLÄPITO</button>
            </div>
        </aside>
    </div>
</div>

<button onclick="window.scrollTo({top:0, behavior:'smooth'})" id="btnTop">YLÖS ↑</button>

<div id="imgModal" onclick="closeImage(event)">
    <img id="modalImage" src="">
</div>

<script>
const sallitutKayttajat = {"tomppa":"Tomi7122","markku":"parkinson","jaakko":"vendingjaska","dan":"huoltodan","tommi":"nappie","samia":"koksmeny","bob":"nayri","jouni":"paju1","jussi":"paukku","sami":"ruoska","jarno":"kurnu"};
let data = {}; let cart = {}; let categoryStructure = [];

window.onscroll = function() {
    let b = document.getElementById("btnTop");
    if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) { b.style.display = "block"; } 
    else { b.style.display = "none"; }
};

async function doAppLogin() {
    const u = document.getElementById("uField").value.trim().toLowerCase();
    const p = document.getElementById("pField").value.trim();
    if (sallitutKayttajat[u] === p) {
        document.getElementById("loginOverlay").style.display = "none";
        document.getElementById("appWrapper").style.display = "block";
        document.getElementById("f_pvm").valueAsDate = new Date();
        await loadAllData();
    } else { alert("Virhe!"); }
}

async function loadAllData() {
    try {
        const [resData, resCats] = await Promise.all([fetch("data.txt"), fetch("kategoriat.txt")]);
        data = parseData(await resData.text());
        categoryStructure = parseCategories(await resCats.text());
        renderNav();
        render();
        populateTopSelect();
    } catch(e) { console.error("Latausvirhe", e); }
}

function parseData(text) {
    const lines = text.split("\n");
    let cats = {}; let curr = null;
    lines.forEach(line => {
        const t = line.trim(); if (!t) return;
        if (!/\d/.test(t.split(" ")[0])) { curr = t; cats[curr] = []; }
        else if (curr) { cats[curr].push({ code: t.split(" ")[0], name: t.substring(t.split(" ")[0].length).trim() }); }
    });
    return cats;
}

function parseCategories(text) {
    const lines = text.split("\n");
    let structure = []; let currentMain = null;
    lines.forEach(line => {
        const t = line.trim(); if (!t) return;
        if (line.startsWith("-")) { if (currentMain) currentMain.subs.push(t.substring(1)); }
        else { currentMain = { name: t, subs: [] }; structure.push(currentMain); }
    });
    return structure;
}

function renderNav() {
    const container = document.getElementById("dynamic-nav");
    container.innerHTML = "";
    categoryStructure.forEach(main => {
        const item = document.createElement("div");
        item.className = "nav-item";
        item.innerHTML = `
            <div class="nav-main-cat" onclick="this.parentElement.classList.toggle('active')">${main.name} <span>▾</span></div>
            <div class="nav-sub-list">${main.subs.map(s => `<div class="nav-sub-item" onclick="jumpTo('${s}')">${s}</div>`).join('')}</div>
        `;
        container.appendChild(item);
    });
}

function populateTopSelect() {
    const sel = document.getElementById("top-cat-select");
    categoryStructure.forEach(main => {
        main.subs.forEach(sub => {
            const opt = document.createElement("option"); opt.value = sub; opt.textContent = sub;
            sel.appendChild(opt);
        });
    });
}

function render(filter = "") {
    const list = document.getElementById("main-list");
    list.innerHTML = "";
    categoryStructure.forEach(main => {
        main.subs.forEach(subName => {
            const prods = data[subName] || [];
            const filtered = prods.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()) || p.code.toLowerCase().includes(filter.toLowerCase()));
            if (filtered.length === 0 && filter) return;

            const block = document.createElement("div");
            block.className = "category-block"; block.id = subName;
            block.innerHTML = `<div style="background:var(--hw-blue); color:white; padding:10px; margin:20px 0 10px 0; border-radius:4px; font-weight:bold;">${subName}</div>`;
            
            filtered.forEach(p => {
                const row = document.createElement("div");
                row.className = "product-item";
                row.innerHTML = `
                    <div class="product-info">
                        <img class="product-thumb" src="images/${p.code}.png" onclick="openImage('${p.code}')" onerror="this.style.display='none'">
                        <div onclick="openImage('${p.code}')" style="cursor:pointer">
                            <div class="product-name">${p.name}</div>
                            <div style="font-size:12px; color:#666;">${p.code}</div>
                        </div>
                    </div>
                    <div class="qty-area">
                        <button class="qty-btn" onclick="updateQty('${p.code}', -1)">-</button>
                        <input class="qty-input" id="q_${p.code}" value="${cart[p.code]?.qty || 0}" readonly>
                        <button class="qty-btn" onclick="updateQty('${p.code}', 1)">+</button>
                    </div>
                `;
                block.appendChild(row);
            });
            list.appendChild(block);
        });
    });
}

function updateQty(code, delta) {
    if (!cart[code]) {
        let name = "";
        for (let c in data) { let p = data[c].find(x => x.code === code); if (p) name = p.name; }
        cart[code] = { code, name, qty: 0 };
    }
    cart[code].qty += delta;
    if (cart[code].qty <= 0) delete cart[code];
    let el = document.getElementById("q_" + code);
    if(el) el.value = cart[code]?.qty || 0;
    updateCartUI();
}

function updateCartUI() {
    const div = document.getElementById("basket-items");
    div.innerHTML = "";
    const items = Object.values(cart);
    items.forEach(i => {
        div.innerHTML += `<div style="padding:8px; border-bottom:1px solid #eee; font-size:12px;"><b>${i.code}</b> ${i.name} <br> <b>${i.qty} kpl</b></div>`;
    });
    document.getElementById("basket-count").textContent = items.length;
}

function jumpTo(id) {
    if(!id) return;
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: "smooth" });
}

function openImage(code) {
    document.getElementById("modalImage").src = `images/${code}.png`;
    document.getElementById("imgModal").style.display = "flex";
}

function closeImage(event) {
    // Jos klikataan taustaa (id=imgModal), eikä itse kuvaa, suljetaan
    if (event.target.id === "imgModal") {
        document.getElementById("imgModal").style.display = "none";
    }
}

function finalSubmit() {
    const f = {
        t: document.getElementById("f_tilaaja").value,
        v: document.getElementById("f_varasto").value,
        p: document.getElementById("f_pvm").value,
        tapa: document.getElementById("f_tapa").value,
        o: document.getElementById("f_osoite").value,
        nro: document.getElementById("f_postinro").value,
        paikka: document.getElementById("f_paikka").value,
        lisatiedot: document.getElementById("f_lisatiedot").value,
        vapaat: document.getElementById("f_vapaat").value
    };
    if(!f.t || !f.v) { alert("Täytä vähintään tilaaja ja varastonumero!"); return; }
    
    let body = `TILAAJA: ${f.t} (${f.v})\nPVM: ${f.p}\nTOIMITUS: ${f.tapa}\nOSOITE: ${f.o}, ${f.nro} ${f.paikka}\n\nTUOTTEET:\n`;
    Object.values(cart).forEach(i => { body += `- ${i.qty} kpl : ${i.name} (${i.code})\n`; });
    if(f.lisatiedot) body += `\nLISÄTIEDOT: ${f.lisatiedot}`;
    if(f.vapaat) body += `\nMUUT TUOTTEET:\n${f.vapaat}`;
    
    window.location.href = `mailto:lpvarasto@hartwall.fi?subject=Tilaus ${f.t}&body=${encodeURIComponent(body)}`;
}
</script>
</body>
</html>
