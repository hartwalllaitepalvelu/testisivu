<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hartwall Varaosatilaus</title>
<style>
:root { --hw-blue:#004593; --hw-dark:#002d62; --hw-green:#28a745; --sidebar-w: 280px; }
body { font-family:'Segoe UI',sans-serif; margin:0; background:#f0f2f5; font-size:14px; color:#333; padding-bottom: 60px;}

/* Kirjautuminen */
#loginOverlay { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--hw-blue); display:flex; justify-content:center; align-items:center; z-index:10000; }
.login-box { background:white; padding:30px; border-radius:15px; width:300px; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,0.5); }

.app-container { display: flex; min-height: 100vh; }
.nav-sidebar { width: var(--sidebar-w); background: white; border-right: 1px solid #ddd; position: sticky; top: 0; height: 100vh; overflow-y: auto; flex-shrink: 0; transition: 0.3s; }
.nav-header { background: var(--hw-dark); color: white; padding: 15px; font-weight: bold; }
.nav-item { border-bottom: 1px solid #eee; }
.nav-main-cat { padding: 12px 15px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; }
.nav-sub-list { display: none; background: #f9f9f9; padding-bottom: 10px; }
.nav-item.active .nav-sub-list { display: block; }

.main-content { flex: 1; padding: 20px; min-width: 0; }
.form-section { background: white; padding: 20px; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 20px; }
.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
.form-group { display: flex; flex-direction: column; }
.form-group label { font-size: 11px; font-weight: bold; color: var(--hw-blue); margin-bottom: 2px; }
.form-group input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
.form-group input:required { border-left: 3px solid red; }

/* Asennuspaketit laatikko */
#pkg-area { background: #fff9c4; border: 2px solid #fbc02d; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
.pkg-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 10px; }
.pkg-btn { padding: 10px; background: var(--hw-blue); color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 11px; font-weight: bold; }

.product-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; background: white; }
.qty-area { display: flex; align-items: center; gap: 8px; }
.qty-btn { width: 32px; height: 32px; border: none; background: #eee; border-radius: 4px; cursor: pointer; font-size: 18px; }
.qty-input { width: 40px; text-align: center; border: 1px solid #ccc; padding: 4px; font-weight: bold; }

/* Kori */
.cart-sidebar { width: var(--sidebar-w); background: white; border-left: 1px solid #ddd; position: sticky; top: 0; height: 100vh; display: flex; flex-direction: column; }
.cart-header { background: var(--hw-green); color: white; padding: 15px; text-align: center; font-weight: bold; }
.cart-item { padding: 10px; border-bottom: 1px solid #eee; font-size: 12px; }

/* Mobiili */
.mobile-bar { display: none; background: var(--hw-dark); padding: 10px; position: sticky; top: 0; z-index: 2000; gap: 10px; }
@media (max-width: 1100px) {
    .nav-sidebar, .cart-sidebar { position: fixed; left: -100%; top: 55px; z-index: 3000; width: 85%; height: calc(100vh - 55px); transition: 0.3s; }
    .cart-sidebar { left: auto; right: -100%; }
    .nav-sidebar.open { left: 0; }
    .cart-sidebar.open { right: 0; }
    .mobile-bar { display: flex; }
}

/* Related Popup */
#relatedOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:12000; justify-content:center; align-items:center; }
#relatedPopup { background:white; width:400px; max-width:90%; border-radius:12px; box-shadow:0 6px 20px rgba(0,0,0,0.3); overflow:hidden; }
.related-item { padding:12px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center; }
</style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2 style="color:var(--hw-blue)">Hartwall Varaosat</h2>
        <input id="uField" placeholder="Käyttäjätunnus" style="width:100%; padding:10px; margin-bottom:10px;">
        <input id="pField" type="password" placeholder="Salasana" style="width:100%; padding:10px; margin-bottom:20px;">
        <button onclick="doAppLogin()" style="width:100%; padding:12px; background:var(--hw-blue); color:white; border:none; cursor:pointer; font-weight:bold;">KIRJAUDU SISÄÄN</button>
    </div>
</div>

<div id="appWrapper" style="display:none;">
    <div id="relatedOverlay">
        <div id="relatedPopup">
            <div style="background:var(--hw-blue); color:white; padding:15px; font-weight:bold; text-align:center;">Suositellut lisäosat</div>
            <div id="relatedContent" style="padding:15px; max-height:300px; overflow-y:auto;"></div>
            <button onclick="document.getElementById('relatedOverlay').style.display='none'" style="width:100%; padding:15px; border:none; background:#eee; font-weight:bold; cursor:pointer;">SULJE</button>
        </div>
    </div>

    <div class="mobile-bar">
        <button onclick="toggleSidebar('nav-sidebar')" style="flex:1; padding:10px;">☰ VALIKKO</button>
        <button onclick="toggleSidebar('cart-sidebar')" style="flex:1; padding:10px;">🛒 KORI (<span id="m-count">0</span>)</button>
    </div>

    <div class="app-container">
        <nav id="nav-sidebar" class="nav-sidebar">
            <div class="nav-header">TUOTERYHMÄT</div>
            <div id="dynamic-nav"></div>
        </nav>

        <main class="main-content">
            <div class="form-section">
                <div class="form-grid">
                    <div class="form-group"><label>TILAAJA *</label><input id="f_tilaaja" required></div>
                    <div class="form-group"><label>VARASTONRO *</label><input id="f_varasto" required></div>
                    <div class="form-group"><label>PÄIVÄMÄÄRÄ *</label><input id="f_pvm" type="date" required></div>
                    <div class="form-group"><label>TOIMITUSTAPA *</label><input id="f_tapa" required></div>
                    <div class="form-group"><label>OSOITE *</label><input id="f_osoite" required></div>
                    <div class="form-group"><label>POSTINUMERO *</label><input id="f_postinro" required></div>
                    <div class="form-group"><label>PAIKKAKUNTA *</label><input id="f_paikka" required></div>
                </div>
                <textarea id="f_lisatiedot" placeholder="Lisätiedot..." style="width:100%; margin-top:10px; height:60px;"></textarea>
                <textarea id="f_vapaat" placeholder="Nimi, kpl määrä..." style="width:100%; margin-top:5px; height:60px;"></textarea>
            </div>

            <div id="pkg-area">
                <strong>ASENNUSPAKETIT</strong>
                <div class="pkg-grid" id="pkg-buttons"></div>
            </div>

            <select id="top-cat-select" onchange="jumpTo(this.value)" style="width:100%; padding:15px; margin-bottom:15px; border:2px solid var(--hw-blue); font-weight:bold; border-radius:6px;"></select>
            <input id="filter" style="width:100%; padding:12px; margin-bottom:20px; box-sizing:border-box;" placeholder="Hae tuotteita..." oninput="render(this.value)">

            <div id="main-list"></div>
        </main>

        <aside id="cart-sidebar" class="cart-sidebar">
            <div class="cart-header">OSTOSKORI (<span id="basket-count">0</span>)</div>
            <div id="basket-items" style="flex:1; overflow-y:auto; padding:10px;"></div>
            <div style="padding:15px; border-top:1px solid #ddd;">
                <button onclick="finalSubmit()" style="width:100%; padding:15px; background:var(--hw-green); color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">LÄHETÄ TILAUS</button>
            </div>
        </aside>
    </div>
</div>

<script>
// TUNNUKSET JA DATA ALKUPERÄISESTÄ TIEDOSTOSTA 
const asennusPaketit = {
    "Kotipizza": [
        { code: "15490", qty: 1 }, { code: "26520", qty: 1 }, { code: "V00713", qty: 5 }, { code: "V00726", qty: 2 },
        { code: "V02356", qty: 1 }, { code: "V41800", qty: 1 }, { code: "V02257", qty: 1 }, { code: "V03010", qty: 1 },
        { code: "T00678", qty: 5 }, { code: "T00723", qty: 1 }, { code: "T41468", qty: 2 }, { code: "T00384", qty: 2 },
        { code: "10172", qty: 1 }, { code: "T41002", qty: 2 }, { code: "T00609", qty: 2 }, { code: "T41101", qty: 2 }
    ],
    "Subway": [
        { code: "15279", qty: 1 }, { code: "10160", qty: 1 }, { code: "26520", qty: 1 }, { code: "V00713", qty: 4 },
        { code: "V00726", qty: 1 }, { code: "V00727", qty: 1 }, { code: "V02356", qty: 1 }, { code: "V41800", qty: 1 },
        { code: "V02257", qty: 1 }, { code: "V03010", qty: 1 }, { code: "T00678", qty: 4 }, { code: "T00723", qty: 1 },
        { code: "T41468", qty: 2 }, { code: "T00384", qty: 2 }, { code: "T41002", qty: 2 }, { code: "T00609", qty: 2 }, { code: "T41101", qty: 2 }
    ],
    "LD Hightower tiskin alle": [
        { code: "19814", qty: 1 }, { code: "30105", qty: 1 }, { code: "V02013", qty: 3 }, { code: "T02223", qty: 3 },
        { code: "T02222", qty: 3 }, { code: "T41460", qty: 3 }, { code: "T41469", qty: 3 }, { code: "V02355", qty: 1 },
        { code: "V03010", qty: 1 }, { code: "V02257", qty: 1 }, { code: "T00609", qty: 1 }, { code: "T41101", qty: 1 },
        { code: "T41002", qty: 1 }, { code: "M01285", qty: 1 }, { code: "M01290", qty: 1 }, { code: "M01296", qty: 1 }
    ]
};

const relatedItems = {
    "V02363": ["V03010","V02257","V02351","T00457","T02256","T41430"],
    "V02355": ["V03010","V02257","V02351","T00457","T02256","T41430"],
    "V02356": ["V03010","V02257","V02351","T00457","T02256","T41430"],
    "V02340": ["V03010","V02257","V02351","T00457","T02256","T41430"],
    "V02351": ["V03010","V02257","V02351","T00457","T02256","T41430"],
    "V02364": ["V03010","V02257","V02351","T00457","T02256","T41430"]
};

const sallitut = {"tomppa":"Tomi7122","markku":"parkinson","jaakko":"vendingjaska","dan":"huoltodan","tommi":"nappie","samia":"koksmeny","bob":"nayri","jouni":"paju1","jussi":"paukku","sami":"ruoska","jarno":"kurnu"};

let allData = {}; let cart = {}; let categories = [];

function toggleSidebar(id) { document.getElementById(id).classList.toggle('open'); }

function doAppLogin() {
    const u = document.getElementById("uField").value.trim().toLowerCase();
    const p = document.getElementById("pField").value.trim();
    if (sallitut[u] === p) {
        document.getElementById("loginOverlay").style.display="none";
        document.getElementById("appWrapper").style.display="block";
        document.getElementById("f_pvm").valueAsDate = new Date();
        loadDataFiles();
    } else { alert("Virhe!"); }
}

async function loadDataFiles() {
    try {
        const [r1, r2] = await Promise.all([fetch("data.txt"), fetch("kategoriat.txt")]);
        if(r1.ok) {
            const t = await r1.text();
            let cur = null;
            t.split("\n").forEach(l => {
                let s = l.trim(); if(!s) return;
                if(!/\d/.test(s.split(" ")[0])) { cur = s; allData[cur] = []; }
                else if(cur) { allData[cur].push({code: s.split(" ")[0], name: s.substring(s.split(" ")[0].length).trim()}); }
            });
        }
        if(r2.ok) {
            const t = await r2.text();
            let curM = null;
            t.split("\n").forEach(l => {
                let s = l.trim(); if(!s) return;
                if(l.startsWith("-")) { if(curM) curM.subs.push(s.substring(1)); }
                else { curM = {name: s, subs: []}; categories.push(curM); }
            });
        }
        renderPkgs(); renderNav(); render();
    } catch(e) { console.error(e); }
}

function renderPkgs() {
    const div = document.getElementById("pkg-buttons"); div.innerHTML = "";
    Object.keys(asennusPaketit).forEach(name => {
        div.innerHTML += `<button class="pkg-btn" onclick="addPkgToCart('${name}')">${name}</button>`;
    });
}

function addPkgToCart(name) {
    asennusPaketit[name].forEach(item => { updateQty(item.code, "", item.qty, true); });
    alert(name + " purettu koriin.");
}

function renderNav() {
    const nav = document.getElementById("dynamic-nav");
    const sel = document.getElementById("top-cat-select");
    nav.innerHTML = ""; sel.innerHTML = '<option value="">-- Valitse kategoria --</option>';
    categories.forEach(c => {
        let div = document.createElement("div"); div.className = "nav-item";
        div.innerHTML = `<div class="nav-main-cat" onclick="this.parentElement.classList.toggle('active')">${c.name} <span>▾</span></div>`;
        let subDiv = document.createElement("div"); subDiv.className = "nav-sub-list";
        c.subs.forEach(s => {
            subDiv.innerHTML += `<div style="padding:8px 30px; cursor:pointer;" onclick="jumpTo('${s}')">${s}</div>`;
            sel.innerHTML += `<option value="${s}">${s}</option>`;
        });
        div.appendChild(subDiv); nav.appendChild(div);
    });
}

function render(filter = "") {
    const list = document.getElementById("main-list"); list.innerHTML = "";
    categories.forEach(c => {
        c.subs.forEach(sub => {
            let prods = allData[sub] || [];
            let filt = prods.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()) || p.code.toLowerCase().includes(filter.toLowerCase()));
            if(filt.length === 0) return;
            let block = document.createElement("div"); block.id = sub;
            block.innerHTML = `<div style="background:var(--hw-blue); color:white; padding:10px; margin:20px 0 10px 0; border-radius:4px; font-weight:bold;">${sub}</div>`;
            filt.forEach(p => {
                block.innerHTML += `
                    <div class="product-item">
                        <div style="flex:1"><b>${p.name}</b><br><small>${p.code}</small></div>
                        <div class="qty-area">
                            <button class="qty-btn" onclick="updateQty('${p.code}','${p.name}',-1)">-</button>
                            <input class="qty-input" id="q_${p.code}" value="${cart[p.code]?.qty || 0}" readonly>
                            <button class="qty-btn" onclick="updateQty('${p.code}','${p.name}',1)">+</button>
                        </div>
                    </div>`;
            });
            list.appendChild(block);
        });
    });
}

function updateQty(code, name, delta, skipRelated = false) {
    if(!cart[code]) {
        if(!name) { // Haetaan nimi jos se puuttuu (paketit)
            for(let cat in allData) { let p = allData[cat].find(x => x.code === code); if(p) { name = p.name; break; } }
        }
        cart[code] = { code, name: name || "Tuote " + code, qty: 0 };
    }
    
    if(delta > 0 && relatedItems[code] && !skipRelated) openRelatedPopup(code);
    
    cart[code].qty += delta;
    if(cart[code].qty <= 0) delete cart[code];
    
    let el = document.getElementById("q_"+code); if(el) el.value = cart[code]?.qty || 0;
    renderCart();
}

function openRelatedPopup(parentCode) {
    const content = document.getElementById("relatedContent"); content.innerHTML = "";
    relatedItems[parentCode].forEach(relCode => {
        let relName = "";
        for (let cat in allData) { let p = allData[cat].find(x => x.code === relCode); if (p) { relName = p.name; break; } }
        content.innerHTML += `
            <div class="related-item">
                <div style="flex:1;"><b>${relCode}</b><br>${relName}</div>
                <button onclick="updateQty('${relCode}', '${relName}', 1, true)" style="background:var(--hw-green); color:white; border:none; padding:8px; border-radius:6px; cursor:pointer; font-weight:bold;">Lisää</button>
            </div>`;
    });
    document.getElementById("relatedOverlay").style.display = "flex";
}

function renderCart() {
    const div = document.getElementById("basket-items"); div.innerHTML = "";
    Object.values(cart).forEach(i => {
        div.innerHTML += `
            <div class="cart-item">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div><b>${i.code}</b><br>${i.name}</div>
                    <div class="qty-area">
                        <button class="qty-btn" onclick="updateQty('${i.code}','${i.name}',-1)">-</button>
                        <input class="qty-input" value="${i.qty}" readonly>
                        <button class="qty-btn" onclick="updateQty('${i.code}','${i.name}',1)">+</button>
                    </div>
                </div>
            </div>`;
    });
    document.getElementById("basket-count").textContent = Object.values(cart).length;
    document.getElementById("m-count").textContent = Object.values(cart).length;
}

function jumpTo(id) {
    const el = document.getElementById(id);
    if(el) { el.scrollIntoView({behavior:"smooth"}); document.getElementById("nav-sidebar").classList.remove('open'); }
}

function finalSubmit() {
    const f = {
        t: document.getElementById("f_tilaaja").value, v: document.getElementById("f_varasto").value,
        p: document.getElementById("f_pvm").value, tapa: document.getElementById("f_tapa").value,
        o: document.getElementById("f_osoite").value, n: document.getElementById("f_postinro").value, k: document.getElementById("f_paikka").value,
        lisatiedot: document.getElementById("f_lisatiedot").value, vapaat: document.getElementById("f_vapaat").value
    };
    if(!f.t || !f.v || !f.p || !f.tapa || !f.o || !f.n || !f.k) return alert("Täytä kaikki pakolliset kentät (*)!");

    const subject = `Varaosatilaus - ${f.t} - ${f.v}`;
    let body = `Tilaaja: ${f.t}\nVarastonumero: ${f.v}\nPäivämäärä: ${f.p}\nToimitustapa: ${f.tapa}\nOsoite: ${f.o}, ${f.n} ${f.k}\n`;
    if(f.lisatiedot) body += `\nLISÄTIEDOT:\n${f.lisatiedot}\n`;
    body += `\nTUOTTEET:\n`;
    Object.values(cart).forEach(i => { body += `- ${i.qty} kpl : ${i.name} (${i.code})\n`; });
    if(f.vapaat) body += `\nMUUT TUOTTEET:\n${f.vapaat}\n`;

    window.location.href = `mailto:lpvarasto@hartwall.fi?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}
</script>
</body>
</html>
