<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hartwall Varaosatilaus</title>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<style>
:root { 
    --hw-blue:#004593; 
    --hw-dark:#002d62;
    --hw-light:#eef4fb; 
    --hw-green:#28a745; 
    --sidebar-left: 300px;
    --sidebar-right: 350px; 
}
body { font-family:'Segoe UI',sans-serif; margin:0; background:#f0f2f5; font-size:14px; color:#333; }

/* Kirjautuminen */
#loginOverlay { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--hw-blue); display:flex; justify-content:center; align-items:center; z-index:10000; }
.login-box { background:white; padding:30px; border-radius:15px; width:320px; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,0.3); }
#appWrapper { display:none; }

/* Layout */
.app-container { display: flex; min-height: 100vh; }

/* VASEN VALIKKO (Power-tyyli) */
.nav-sidebar { 
    width: var(--sidebar-left); 
    background: white; 
    border-right: 1px solid #ddd; 
    position: sticky; 
    top: 0; 
    height: 100vh; 
    overflow-y: auto; 
    flex-shrink: 0;
}
.nav-header { 
    background: var(--hw-dark); 
    color: white; 
    padding: 15px; 
    font-weight: bold; 
    font-size: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.nav-item { 
    border-bottom: 1px solid #eee; 
    cursor: pointer;
}
.nav-main-cat {
    padding: 12px 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 600;
    transition: background 0.2s;
}
.nav-main-cat:hover { background: #f8f9fa; }
.nav-sub-list { 
    background: #fdfdfd; 
    display: none; 
    padding-bottom: 10px;
}
.nav-sub-item {
    padding: 8px 15px 8px 30px;
    font-size: 13px;
    color: #555;
    transition: color 0.2s;
}
.nav-sub-item:hover { color: var(--hw-blue); text-decoration: underline; }
.nav-item.active .nav-sub-list { display: block; }
.nav-item.active .nav-main-cat { color: var(--hw-blue); background: var(--hw-light); }

/* KESKIALUE */
.main-content { flex: 1; padding: 20px; min-width: 0; }

/* TIIVISTETTY LOMAKE */
.form-grid { 
    display: grid; 
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
    gap: 10px; 
    background: white; 
    padding: 15px; 
    border-radius: 8px; 
    border: 1px solid #ccc;
    margin-bottom: 20px;
}
.form-group { display: flex; flex-direction: column; }
.form-group label { font-size: 11px; font-weight: bold; color: var(--hw-blue); margin-bottom: 2px; }
.form-group input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }

/* TUOTELISTAUS */
header { background:white; padding:15px; border-radius:8px; margin-bottom:15px; border-bottom:3px solid var(--hw-blue); }
.search-box { width:100%; padding:12px; border:1px solid #ddd; border-radius:6px; }

.category-block { margin-top:30px; scroll-margin-top: 20px; }
.category-title { background:var(--hw-blue); color:white; padding:10px 15px; border-radius:6px; font-weight:bold; margin-bottom:10px; }

.product-item { 
    display:grid; grid-template-columns:50px 1fr auto; gap:15px; 
    padding:12px; border-bottom:1px solid #eee; background:white; align-items:center; 
}
.product-thumb { width:50px; height:50px; object-fit:contain; border-radius:4px; opacity:0; transition:0.3s; }
.product-name { font-weight:600; color:var(--hw-blue); cursor:pointer; }
.product-code { font-size:12px; color:#666; }

/* OIKEA OSTOSKORI */
.cart-sidebar { 
    width: var(--sidebar-right); 
    background: white; 
    border-left: 1px solid #ddd; 
    position: sticky; 
    top: 0; 
    height: 100vh; 
    display: flex; 
    flex-direction: column; 
}
.cart-header { background: var(--hw-green); color:white; padding:15px; text-align:center; font-weight:bold; }
.cart-items { flex:1; overflow-y:auto; padding:10px; }
.basket-item { display:flex; gap:10px; padding:8px; border-bottom:1px solid #eee; align-items:center; font-size:13px; }

/* Admin & Modal */
#adminSection { display: none; position: fixed; bottom: 0; width: 100%; background: white; border-top: 3px solid var(--hw-blue); padding: 10px; z-index: 5000; }
#adminSection.active { display: flex; gap: 10px; justify-content: center; }
#imgModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:20000; justify-content:center; align-items:center; }

.qty-controls { display:flex; align-items:center; gap:5px; }
.qty-btn { width:28px; height:28px; border:none; background:#eee; border-radius:4px; cursor:pointer; font-weight:bold; }

@media (max-width: 1100px) {
    .nav-sidebar { display: none; }
    .cart-sidebar { display: none; }
}
</style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2 style="color:var(--hw-blue)">Hartwall Varaosat</h2>
        <input id="uField" placeholder="Käyttäjätunnus" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ccc; border-radius:6px;">
        <input id="pField" type="password" placeholder="Salasana" style="width:100%; padding:10px; margin-bottom:20px; border:1px solid #ccc; border-radius:6px;">
        <button onclick="doAppLogin()" style="width:100%; padding:12px; background:var(--hw-blue); color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">KIRJAUDU SISÄÄN</button>
    </div>
</div>

<div id="appWrapper">
    <div class="app-container">
        <nav class="nav-sidebar">
            <div class="nav-header">TUOTERYHMÄT <span>☰</span></div>
            <div id="dynamic-nav"></div>
        </nav>

        <main class="main-content">
            <div class="form-grid">
                <div class="form-group"><label>TILAAJA *</label><input id="f_tilaaja"></div>
                <div class="form-group"><label>VARASTONRO *</label><input id="f_varasto"></div>
                <div class="form-group"><label>PÄIVÄMÄÄRÄ *</label><input id="f_pvm" type="date"></div>
                <div class="form-group"><label>TOIMITUSTAPA *</label><input id="f_tapa"></div>
                <div class="form-group"><label>OSOITE *</label><input id="f_osoite"></div>
                <div class="form-group"><label>POSTINRO *</label><input id="f_postinro"></div>
                <div class="form-group"><label>PAIKKAKUNTA *</label><input id="f_paikka"></div>
            </div>

            <header>
                <input id="filter" class="search-box" placeholder="Hae tuotteita..." oninput="render(this.value)">
            </header>

            <div id="main-list"></div>
        </main>

        <aside class="cart-sidebar">
            <div class="cart-header">OSTOSKORI (<span id="basket-count">0</span>)</div>
            <div id="basket-items" class="cart-items"></div>
            <div style="padding:15px; background:#f9f9f9;">
                <textarea id="f_lisatiedot" placeholder="Lisätiedot..." style="width:100%; margin-bottom:10px; padding:5px;"></textarea>
                <textarea id="f_vapaat" placeholder="Muut tuotteet (koodi/kpl)..." style="width:100%; margin-bottom:10px; padding:5px;"></textarea>
                <button onclick="finalSubmit()" style="width:100%; padding:15px; background:var(--hw-green); color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">LÄHETÄ TILAUS</button>
                <button id="adminLoginBtn" style="width:100%; margin-top:10px; font-size:10px; background:none; border:none; color:#aaa; cursor:pointer;">Ylläpito</button>
            </div>
        </aside>
    </div>
</div>

<div id="imgModal"><img id="modalImage" style="max-width:90%; max-height:90%;"><span id="closeModal" style="position:fixed; top:20px; right:30px; color:white; font-size:40px; cursor:pointer;">&times;</span></div>

<script>
// (Sallitut käyttäjät ja asennuspaketit säilyvät samoina kuin aiemmin...)
const sallitutKayttajat = {"tomppa":"Tomi7122","markku":"parkinson","jaakko":"vendingjaska","dan":"huoltodan","tommi":"nappie","samia":"koksmeny","bob":"nayri","jouni":"paju1","jussi":"paukku","sami":"ruoska","jarno":"kurnu"};

let data = {}; let cart = {}; let stockStatus = {}; let categoryStructure = [];

async function doAppLogin() {
    const u = document.getElementById("uField").value.trim().toLowerCase();
    const p = document.getElementById("pField").value.trim();
    if (sallitutKayttajat[u] === p) {
        document.getElementById("loginOverlay").style.display = "none";
        document.getElementById("appWrapper").style.display = "block";
        document.getElementById("f_pvm").valueAsDate = new Date();
        await loadAllData();
    } else { alert("Virhe!"); }
}

async function loadAllData() {
    try {
        const [resData, resCats] = await Promise.all([fetch("data.txt"), fetch("kategoriat.txt")]);
        const textData = await resData.text();
        const textCats = await resCats.text();
        
        data = parseData(textData);
        categoryStructure = parseCategories(textCats);
        
        renderNav();
        render();
    } catch(e) { console.error("Datan lataus epäonnistui"); }
}

function parseData(text) {
    const lines = text.split("\n");
    let cats = {}; let curr = null;
    lines.forEach(line => {
        const t = line.trim(); if (!t) return;
        const first = t.split(" ")[0];
        if (!/\d/.test(first)) { curr = t; cats[curr] = []; }
        else if (curr) { cats[curr].push({ code: first, name: t.substring(first.length).trim() }); }
    });
    return cats;
}

function parseCategories(text) {
    const lines = text.split("\n");
    let structure = []; let currentMain = null;
    lines.forEach(line => {
        const t = line.trim(); if (!t) return;
        if (line.startsWith("-")) {
            if (currentMain) currentMain.subs.push(t.substring(1));
        } else {
            currentMain = { name: t, subs: [] };
            structure.push(currentMain);
        }
    });
    return structure;
}

function renderNav() {
    const container = document.getElementById("dynamic-nav");
    container.innerHTML = "";
    categoryStructure.forEach(main => {
        const item = document.createElement("div");
        item.className = "nav-item";
        item.innerHTML = `
            <div class="nav-main-cat" onclick="this.parentElement.classList.toggle('active')">
                ${main.name} <span>❯</span>
            </div>
            <div class="nav-sub-list">
                ${main.subs.map(s => `<div class="nav-sub-item" onclick="jumpTo('${s}')">${s}</div>`).join('')}
            </div>
        `;
        container.appendChild(item);
    });
}

function render(filter = "") {
    const list = document.getElementById("main-list");
    list.innerHTML = "";
    
    // Käydään läpi kategoriat.txt mukaisessa järjestyksessä
    categoryStructure.forEach(main => {
        main.subs.forEach(subName => {
            const prods = data[subName] || [];
            const filtered = prods.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()) || p.code.toLowerCase().includes(filter.toLowerCase()));
            if (filtered.length === 0 && filter) return;

            const block = document.createElement("div");
            block.className = "category-block";
            block.id = subName;
            block.innerHTML = `<div class="category-title">${subName}</div>`;
            
            filtered.forEach(p => {
                const row = document.createElement("div");
                row.className = "product-item";
                row.innerHTML = `
                    <img class="product-thumb" id="img_${p.code}" src="images/${p.code}.png" onload="this.style.opacity=1" onerror="this.style.display='none'">
                    <div class="product-info">
                        <div class="product-name" onclick="openImage('${p.code}')">${p.name}</div>
                        <div class="product-code">${p.code}</div>
                    </div>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="updateQty('${p.code}', -1)">-</button>
                        <span id="q_${p.code}">${cart[p.code]?.qty || 0}</span>
                        <button class="qty-btn" onclick="updateQty('${p.code}', 1)">+</button>
                    </div>
                `;
                block.appendChild(row);
            });
            list.appendChild(block);
        });
    });
}

function updateQty(code, delta) {
    if (!cart[code]) {
        let name = "";
        for (let c in data) { let p = data[c].find(x => x.code === code); if (p) name = p.name; }
        cart[code] = { code, name, qty: 0 };
    }
    cart[code].qty += delta;
    if (cart[code].qty <= 0) delete cart[code];
    
    const disp = document.getElementById("q_" + code); if (disp) disp.textContent = cart[code]?.qty || 0;
    updateCartUI();
}

function updateCartUI() {
    const div = document.getElementById("basket-items");
    div.innerHTML = "";
    const items = Object.values(cart);
    items.forEach(i => {
        div.innerHTML += `
            <div class="basket-item">
                <div style="flex:1"><b>${i.code}</b><br>${i.name}</div>
                <div>${i.qty} kpl</div>
            </div>`;
    });
    document.getElementById("basket-count").textContent = items.length;
}

function jumpTo(id) {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: "smooth" });
}

function openImage(code) {
    document.getElementById("modalImage").src = `images/${code}.png`;
    document.getElementById("imgModal").style.display = "flex";
}
document.getElementById("closeModal").onclick = () => document.getElementById("imgModal").style.display = "none";

function finalSubmit() {
    // Sama sähköpostilähetys kuin aiemminkin...
    const f = {
        t: document.getElementById("f_tilaaja").value,
        v: document.getElementById("f_varasto").value,
        p: document.getElementById("f_pvm").value,
        tapa: document.getElementById("f_tapa").value,
        o: document.getElementById("f_osoite").value,
        nro: document.getElementById("f_postinro").value,
        paikka: document.getElementById("f_paikka").value,
        lisatiedot: document.getElementById("f_lisatiedot").value,
        vapaat: document.getElementById("f_vapaat").value
    };
    if(!f.t || !f.v) { alert("Täytä tilaajatiedot!"); return; }
    
    let body = `TILAAJA: ${f.t} (${f.v})\nPVM: ${f.p}\nTOIMITUS: ${f.tapa}\nOSOITE: ${f.o}, ${f.nro} ${f.paikka}\n\nTUOTTEET:\n`;
    Object.values(cart).forEach(i => { body += `- ${i.qty} kpl : ${i.name} (${i.code})\n`; });
    if(f.lisatiedot) body += `\nLISÄTIEDOT: ${f.lisatiedot}`;
    if(f.vapaat) body += `\nMUUT: ${f.vapaat}`;
    
    window.location.href = `mailto:lpvarasto@hartwall.fi?subject=Tilaus ${f.t}&body=${encodeURIComponent(body)}`;
}
</script>
</body>
</html>
